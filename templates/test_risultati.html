<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Le tue regole - Educazione Digitale Familiare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar-custom d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand-text text-decoration-none" href="/">
      🌿 Educazione Digitale Familiare
    </a>
    <a href="/" class="btn-search" style="text-decoration:none;font-size:0.9rem;">Torna alla home</a>
  </nav>

  <section id="pdf-content" style="max-width:700px;margin:3rem auto;padding:0 1.5rem;">
    <div class="section-label">Risultati del test</div>
    <h2 class="section-title">Le regole consigliate per te</h2>
    <p class="section-sub">Ecco le regole selezionate in base alle tue risposte. Clicca su ognuna per leggere i dettagli.</p>

    <div id="regole-container"><p style="color:var(--text-muted)">Caricamento...</p></div>

    <div style="margin-top:2rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <button id="download-pdf" class="btn-primary-hero" disabled>Salva il patto in PDF</button>
      <a href="/test" class="btn-secondary-hero">Rifai il test</a>
      <a href="/" class="btn-primary-hero">Torna alla home</a>
    </div>
  </section>

 <script>
  var regoleAttive = [];

  async function caricaRegole() {
    var container = document.getElementById('regole-container');
    try {
      var params = new URLSearchParams(window.location.search);
      var raw = params.get('regole');
      var nomiRegole = JSON.parse(decodeURIComponent(raw));

      var res = await fetch('/api/test_iniziale');
      var data = await res.json();
      var regole_db = data.regole;

      var unici = [...new Set(nomiRegole)];
      regoleAttive = unici.map(function(nome) {
        return { nome: nome, dati: regole_db[nome] || {} };
      });

      renderRegole();
    } catch(e) {
      container.innerHTML = '<p style="color:#D85A30;">Errore nel caricamento delle regole.</p>';
    }
  }

  function renderRegole() {
    var container = document.getElementById('regole-container');
    if (regoleAttive.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted)">Nessuna regola selezionata.</p>';
      var btn = document.getElementById('download-pdf');
      if (btn) btn.disabled = true;
      return;
    }

    container.innerHTML = '';
    regoleAttive.forEach(function(item, index) {
      var icona = item.dati.icona || '📌';
      var desc = item.dati.descrizione || '';
      var card = document.createElement('div');
      card.className = 'risultato-card';
      card.setAttribute('data-index', index);
      card.innerHTML =
        '<div class="risultato-header">' +
          '<div class="risultato-header-left" onclick="toggleDesc(this)">' +
            '<span class="risultato-nome">' + icona + ' ' + item.nome + '</span>' +
            '<span class="risultato-arrow">&#9660;</span>' +
          '</div>' +
          '<button class="btn-elimina-regola" onclick="eliminaRegola(' + index + ')" title="Rimuovi questa regola" aria-label="Elimina regola ' + item.nome + '">🗑️</button>' +
        '</div>' +
        '<div class="risultato-desc">' +
          '<p>' + desc + '</p>' +
        '</div>';
      container.appendChild(card);
    });
    abilitaPDF();
  }

  function eliminaRegola(index) {
    regoleAttive.splice(index, 1);
    renderRegole();
  }

  function toggleDesc(headerLeft) {
    var header = headerLeft.parentElement;
    var desc = header.nextElementSibling;
    var arrow = headerLeft.querySelector('.risultato-arrow');
    if (desc.style.display === 'block') {
      desc.style.display = 'none';
      arrow.innerHTML = '&#9660;';
    } else {
      desc.style.display = 'block';
      arrow.innerHTML = '&#9650;';
    }
  }

  function abilitaPDF() {
    var btn = document.getElementById('download-pdf');
    if (btn) btn.disabled = false;
  }

  function apriTutteLeSchede() {
    document.querySelectorAll('.risultato-desc').forEach(function(desc) {
      desc.style.display = 'block';
      var headerLeft = desc.previousElementSibling.querySelector('.risultato-header-left');
      if (headerLeft) {
        var arrow = headerLeft.querySelector('.risultato-arrow');
        if (arrow) arrow.innerHTML = '&#9650;';
      }
    });
  }

  function downloadPDF() {
    var elemento = document.getElementById('pdf-content');
    if (!elemento) return;
    apriTutteLeSchede();
    var opt = {
      margin: 0.5,
      filename: 'patto_familiare.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    setTimeout(function() { html2pdf().set(opt).from(elemento).save(); }, 100);
  }

  document.getElementById('download-pdf').addEventListener('click', downloadPDF);
  caricaRegole();
</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
</body>
</html>
