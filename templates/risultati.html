<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Risultati - Educazione Digitale Familiare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar-custom d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand-text text-decoration-none" href="/">
      Educazione Digitale Familiare
    </a>
    <a href="/" class="btn-search" style="text-decoration:none;font-size:0.9rem;">Nuova ricerca</a>
  </nav>
  <section style="max-width:700px;margin:3rem auto;padding:0 1.5rem;">
    <div class="section-label">Risultati della tua ricerca</div>
    <h2 class="section-title">Le aree piu rilevanti per te</h2>
    <p class="section-sub">Clicca su una categoria per leggere la spiegazione ed eventiali approfondimenti teorici.</p>
    <div id="risultati-container"><p style="color:var(--text-muted)">Caricamento...</p></div>
    <div style="margin-top:2rem;text-align:center;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn-secondary-hero">Torna alla ricerca</a>
      <a id="btn-patto" href="#" class="btn-primary-hero">Crea il tuo patto familiare</a>
    </div>
  </section>
  <script>
    var categorieIds = [];

    function toggleDesc(header) {
      var desc = header.nextElementSibling;
      var arrow = header.querySelector('.risultato-arrow');
      if (desc.style.display === 'block') {
        desc.style.display = 'none';
        arrow.innerHTML = '&#9660;';
      } else {
        desc.style.display = 'block';
        arrow.innerHTML = '&#9650;';
      }
    }

    async function caricaRisultati() {
      var container = document.getElementById('risultati-container');
      try {
        var params = new URLSearchParams(window.location.search);
        var raw = params.get('data');
        var risultati = JSON.parse(decodeURIComponent(raw));
        var res = await fetch('/api/categorie');
        var categorie = await res.json();
        container.innerHTML = '';

        risultati.forEach(function(r) {
          categorieIds.push(r.id);
          var info = categorie[r.id] || {};
          var nome = info.nome || r.nome;
          var descrizione = info.descrizione || r.descrizione;
          var link = info.link || '';
          var card = document.createElement('div');
          card.className = 'risultato-card';
          card.innerHTML =
            '<div class="risultato-header" onclick="toggleDesc(this)">' +
              '<span class="risultato-nome">' + nome + '</span>' +
              '<span class="risultato-arrow">&#9660;</span>' +
            '</div>' +
            '<div class="risultato-desc">' +
              '<p>' + descrizione + '</p>' +
              (link ? '<div style="margin-top:1rem;"><a href="' + link + '" target="_blank" class="btn-search" style="text-decoration:none;">Approfondisci &rarr;</a></div>' : '') +
            '</div>';
          container.appendChild(card);
        });

        var btnPatto = document.getElementById('btn-patto');
        btnPatto.href = '/test?categorie=' + encodeURIComponent(JSON.stringify(categorieIds));
      } catch(e) {
        container.innerHTML = '<p style="color:#D85A30;">Errore nel caricamento dei risultati.</p>';
      }
    }

    caricaRisultati();
  </script>
</body>
</html>
